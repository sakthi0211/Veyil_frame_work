<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veyil Frame Works</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #1a1a40, #0a0a1f);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 25px;
  padding: 40px 30px;
  text-align: center;
  width: 320px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.logo {
  width: 90px;
  margin-bottom: 15px;
}

h1 {
  font-size: 26px;
  margin-bottom: 5px;
}

p {
  color: #bbb;
  font-size: 14px;
  margin-bottom: 25px;
}

.btn {
  display: block;
  margin: 12px 0;
  padding: 14px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s ease;
}

.insta {
  background: rgba(255,255,255,0.08);
  color: white;
}

.whatsapp {
  background: linear-gradient(135deg, #25D366, #1ebe5d);
  color: white;
}

.scan {
  background: linear-gradient(135deg, #ff4da6, #ff2e82);
  color: white;
}

.btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="card">
  <img src="logo.jpg" class="logo">

  <h1>Veyil Frame Works</h1>
  <p>Low Cost • Best Quality</p>

  <a class="btn insta" href="https://instagram.com/veyil_frame_works" target="_blank">
    Instagram
  </a>

  <a class="btn whatsapp" href="https://wa.me/919003550484" target="_blank">
    Chat on WhatsApp
  </a>

 <a class="btn scan" href="scan.html">
    Scan Magic Frame
  </a>
</div>

</body>
</html>
