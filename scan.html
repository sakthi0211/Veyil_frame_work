<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

/* canvas full screen */
canvas {
  position: fixed;
  top:0; left:0;
  width:100% !important;
  height:100% !important;
}

/* start button */
#startBtn {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:15px 25px;
  font-size:18px;
  background:#ff4da6;
  color:white;
  border:none;
  border-radius:10px;
  z-index:10;
}

/* status text */
#status {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:18px;
  z-index:10;
}

/* full screen video overlay */
#fullscreenVideo {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  z-index:9;
}
</style>
</head>

<body>

<button id="startBtn">Start Scan</button>
<div id="status">Click Start</div>

<!-- Full screen video -->
<video id="fullscreenVideo" src="./video.mp4" loop muted playsinline></video>

<script>
document.getElementById("startBtn").onclick = async () => {

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("status").innerText = "Scanning...";

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: "./targets.mind",
    videoSettings: { facingMode: "environment" }
  });

  const {renderer, scene, camera} = mindarThree;

  // 🎬 Video for AR plane
  const video = document.createElement("video");
  video.src = "./video.mp4";
  video.loop = true;
  video.muted = true;
  video.playsInline = true;

  const texture = new THREE.VideoTexture(video);

  // 📐 Bigger plane (nearly full view)
  const geometry = new THREE.PlaneGeometry(2, 1.2);
  const material = new THREE.MeshBasicMaterial({ map: texture });
  const plane = new THREE.Mesh(geometry, material);
  plane.visible = false;

  const anchor = mindarThree.addAnchor(0);
  anchor.group.add(plane);

  const fullVideo = document.getElementById("fullscreenVideo");

  // 🔥 EVENTS
  anchor.onTargetFound = () => {
    console.log("TARGET FOUND");
    document.getElementById("status").innerText = "TARGET FOUND 🔥";

    plane.visible = true;
    video.play();

    // also show full screen version
    fullVideo.style.display = "block";
    fullVideo.play();
  };

  anchor.onTargetLost = () => {
    console.log("TARGET LOST");
    document.getElementById("status").innerText = "TARGET LOST ❌";

    plane.visible = false;
    video.pause();

    fullVideo.style.display = "none";
    fullVideo.pause();
  };

  await mindarThree.start();

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
};
</script>

</body>
</html>
