<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scan</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* FORCE FULL SCREEN CAMERA CANVAS */
canvas {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover;
}

/* Start Button */
#startBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 16px 28px;
  font-size: 18px;
  background: #ff4da6;
  color: white;
  border: none;
  border-radius: 12px;
  z-index: 10;
}

/* Status */
#status {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 16px;
  z-index: 10;
}
</style>
</head>

<body>

<button id="startBtn">Start Scan</button>
<div id="status">Ready</div>

<script>
document.getElementById("startBtn").onclick = async () => {

  document.getElementById("startBtn").style.display = "none";
  document.getElementById("status").innerText = "Opening Camera...";

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: "./targets.mind",
    videoSettings: {
      facingMode: { exact: "environment" } // force rear camera
    }
  });

  const {renderer, scene, camera} = mindarThree;

  // 🎬 Video
  const video = document.createElement("video");
  video.src = "./video.mp4";
  video.loop = true;
  video.muted = true;
  video.playsInline = true;

  const texture = new THREE.VideoTexture(video);

  // 🔥 Bigger plane
  const geometry = new THREE.PlaneGeometry(2.2, 1.3);
  const material = new THREE.MeshBasicMaterial({ map: texture });
  const plane = new THREE.Mesh(geometry, material);
  plane.visible = false;

  const anchor = mindarThree.addAnchor(0);
  anchor.group.add(plane);

  // EVENTS
  anchor.onTargetFound = () => {
    document.getElementById("status").innerText = "TARGET FOUND 🔥";
    plane.visible = true;
    video.play();
  };

  anchor.onTargetLost = () => {
    document.getElementById("status").innerText = "Searching...";
    plane.visible = false;
    video.pause();
  };

  await mindarThree.start();

  // 🔥 CRITICAL: force full screen render
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });

  document.getElementById("status").innerText = "Scanning...";
};
</script>

</body>
</html>
